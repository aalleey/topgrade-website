<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Software | TopGradeSoftware</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f4f8;
            min-height: 100vh;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--primary);
            color: var(--white);
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
        }

        .sidebar-brand span {
            color: var(--accent-blue);
        }

        .nav-menu {
            list-style: none;
            padding: 1.5rem 0;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.8rem 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: var(--transition);
            border-left: 4px solid transparent;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--white);
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--accent-blue);
        }

        .nav-link i {
            width: 24px;
            margin-right: 1rem;
            font-size: 1.1rem;
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--btn-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .user-details h4 {
            font-size: 0.95rem;
            color: var(--white);
            margin-bottom: 0;
        }

        .user-details p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 2rem;
        }

        .top-bar {
            background: var(--white);
            padding: 1rem 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title h1 {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 0;
        }

        /* Software Grid */
        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .software-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition);
        }

        .software-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .software-img {
            height: 160px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 3rem;
        }

        .software-body {
            padding: 1.5rem;
        }

        .software-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .status-active {
            background: #e6fffa;
            color: #00b894;
        }

        .status-expired {
            background: #fff5f5;
            color: #fc5c65;
        }

        .software-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .software-expiry {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .software-actions {
            display: flex;
            gap: 1rem;
        }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .main-content {
                margin-left: 0;
            }

            .sidebar.active {
                transform: translateX(0);
            }
        }
    </style>
	<script src="theme-manager.js"></script>
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-brand">TopGrade<span>Software</span></a>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">
                        <i class="fas fa-th-large"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="my-software.html" class="nav-link active">
                        <i class="fas fa-box"></i> My Software
                    </a>
                </li>
                <li class="nav-item">
                    <a href="invoices.html" class="nav-link">
                        <i class="fas fa-file-invoice"></i> Invoices
                    </a>
                </li>
                <li class="nav-item">
                    <a href="account-settings.html" class="nav-link">
                        <i class="fas fa-user-cog"></i> Account Settings
                    </a>
                </li>
                <li class="nav-item">
                    <a href="support.html" class="nav-link">
                        <i class="fas fa-headset"></i> Support
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">AD</div>
                    <div class="user-details">
                        <h4>Admin User</h4>
                        <p>admin@topgrade.com</p>
                    </div>
                </div>
                <a href="login.html" class="btn btn-secondary-outline btn-block"
                    style="border-color: rgba(255,255,255,0.2); color: white;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1>My Software</h1>
                </div>
                <div class="actions">
                    <button class="btn btn-primary btn-sm">
                        <i class="fas fa-plus"></i> Buy New
                    </button>
                    <!-- Mobile Menu Trigger -->
                    <button class="btn btn-sm btn-white mobile-only" style="display:none; margin-left:1rem;">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>

            <!-- Software Grid -->
            <div class="software-grid">
                <!-- Product 1 -->
                <div class="software-card">
                    <div class="software-img"
                        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                        <i class="fas fa-cash-register"></i>
                    </div>
                    <div class="software-body">
                        <span class="software-status status-active">Active</span>
                        <h3 class="software-title">POS Management System</h3>
                        <p class="software-expiry">Expires on: Dec 31, 2026</p>
                        <div class="software-actions">
                            <button class="btn btn-primary btn-sm" style="flex:1">Launch</button>
                            <button class="btn btn-secondary-outline btn-sm" style="flex:1">Renew</button>
                        </div>
                    </div>
                </div>

                <!-- Product 2 -->
                <div class="software-card">
                    <div class="software-img"
                        style="background: linear-gradient(135deg, #2af598 0%, #009efd 100%); color: white;">
                        <i class="fab fa-whatsapp"></i>
                    </div>
                    <div class="software-body">
                        <span class="software-status status-expired">Expired</span>
                        <h3 class="software-title">WhatsApp Marketing Tool</h3>
                        <p class="software-expiry">Expired on: Jan 15, 2026</p>
                        <div class="software-actions">
                            <button class="btn btn-primary btn-sm" style="flex:1; opacity:0.5; cursor:not-allowed;"
                                disabled>Launch</button>
                            <button class="btn btn-secondary-outline btn-sm"
                                style="flex:1; border-color: var(--accent); color: var(--accent);">Renew Now</button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
<script src="navbar-component.js"></script>
    <script src="main.js"></script>
</body>

</html>
