<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TopGradeSoftware</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="theme-manager.js"></script>
    <style>
        .login-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-body);
            position: relative;
            overflow: hidden;
        }

        .login-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(0, 96, 56, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 0;
            animation: pulse 10s infinite;
        }

        .login-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            position: relative;
            z-index: 1;
            border: 1px solid var(--border-light);
            color: var(--text-main);
            text-align: center;
        }


        .login-logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 2rem;
            display: inline-block;
        }


        .login-logo span {
            color: var(--accent-blue);
        }

        .login-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }


        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
        }


        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #b0c4de;
            transition: var(--transition);
        }

        .input-group input {
            padding-left: 2.8rem;
        }

        .input-group input:focus+i {
            color: var(--accent-blue);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Security Badge */
        .security-badge {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #4CAF50;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .recaptcha-mock {
            background: #f9f9f9;
            border: 1px solid #d3d3d3;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: Roboto, sans-serif;
            width: 100%;
        }

        .recaptcha-check {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recaptcha-box {
            width: 24px;
            height: 24px;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            background: white;
            cursor: pointer;
        }

        .recaptcha-text {
            font-size: 14px;
            color: #000;
        }

        .recaptcha-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #555;
        }

        .recaptcha-logo i {
            font-size: 18px;
            color: #4285f4;
            margin-bottom: 2px;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            z-index: 10;
        }

        .back-link:hover {
            color: var(--white);
        }
    </style>
</head>

<body>
    <!-- Back to Home -->
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <section class="login-section reveal">
        <div class="login-card">
            <a href="index.html" class="login-logo">TopGrade<span>Software</span></a>
            <h2 class="login-title">Welcome Back 👋</h2>
            <p class="login-subtitle">Secure login to your dashboard</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Email / Phone -->
                <div class="form-group">
                    <label for="username">Email or Phone</label>
                    <div class="input-group">
                        <input type="text" id="username" placeholder="user@example.com" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <!-- Options -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <!-- Mock ReCAPTCHA -->
                <div class="recaptcha-mock">
                    <div class="recaptcha-check">
                        <div class="recaptcha-box"
                            onclick="this.style.background='#4285f4'; this.style.border='none'; this.innerHTML='<i class=\'fas fa-check\' style=\'color:white; font-size:14px; display:flex; justify-content:center; align-items:center; height:100%;\'></i>'">
                        </div>
                        <span class="recaptcha-text">I'm not a robot</span>
                    </div>
                    <div class="recaptcha-logo">
                        <i class="fas fa-sync-alt"></i>
                        <span>reCAPTCHA</span>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt" style="margin-right:0.5rem"></i> Log In
                </button>
            </form>

            <div class="security-badge">
                <i class="fas fa-shield-alt"></i> 256-bit SSL Encrypted Connection
            </div>
        </div>
    </section>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;

            // Loading State
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            btn.style.opacity = '0.8';

            setTimeout(() => {
                // Success
                btn.innerHTML = '<i class="fas fa-check"></i> Success!';
                btn.style.background = '#4CAF50';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            }, 1500);
        }
    </script>
    <script src="navbar-component.js"></script>
    <script src="main.js"></script>
</body>

</html>
